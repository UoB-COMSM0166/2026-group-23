<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Dark canvas matches visual-identity.md (Void Black) -->
  <rect width="900" height="760" fill="#0F172A" />

  <!-- ─── Title ─── -->
